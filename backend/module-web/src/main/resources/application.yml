spring:
  application:
    name: car-ledger-web
  datasource:
    url: jdbc:mariadb://localhost:3306/car_ledger?useUnicode=true&characterEncoding=utf8
    username: root
    password: password
    driver-class-name: org.mariadb.jdbc.Driver
