services:
  mariadb:
    image: mariadb:latest
    container_name: vms-mariadb
    environment:
      MARIADB_ROOT_PASSWORD: qwer123$
      MARIADB_DATABASE: vms
    ports:
      - "3306:3306"
    volumes:
      - vms-data:/var/lib/mysql

  nginx:
    image: nginx:latest
    container_name: vms-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

